<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Days Without Sugar</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, sans-serif;
      background: #f7f4ef;
      color: #1f1f1f;
      padding: 24px;
      text-align: center;
    }

    .tracker {
      width: 100%;
      max-width: 560px;
      /* background: #ffffff; */
      border-radius: 28px;
      padding: 52px 28px;
      /* box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08); */
    }

    .title {
      font-size: 24px;
      font-weight: 800;
      margin-bottom: 28px;
    }

    .counter {
      font-size: clamp(56px, 13vw, 110px);
      line-height: 1;
      font-weight: 900;
      letter-spacing: -3px;
      margin-bottom: 28px;
    }

    .message {
      font-size: 16px;
      line-height: 1.6;
      color: #777;
      max-width: 360px;
      margin: 0 auto;
    }

    @media (max-width: 480px) {
      .tracker {
        padding: 42px 22px;
      }

      .title {
        font-size: 21px;
      }

      .counter {
        font-size: clamp(46px, 16vw, 72px);
        letter-spacing: -2px;
      }
    }
  </style>
</head>

<body>
  <main class="tracker">
    <h1 class="title">Days Without Sugar 🍩🚫</h1>

    <div class="counter" id="durationDisplay">0 Days</div>

    <p class="message">
      One day at a time. Your future self will thank you.
    </p>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

  <script>
    const today = new Date();

    const startDate = new Date(today.getFullYear(), 5, 11);

    startDate.setHours(0, 0, 0, 0);
    today.setHours(0, 0, 0, 0);

    const msPerDay = 1000 * 60 * 60 * 24;
    const totalDays = Math.max(0, Math.floor((today - startDate) / msPerDay));

    const durationDisplay = document.getElementById("durationDisplay");

    function plural(value, label) {
      return value === 1 ? label : label + "s";
    }

    function getCalendarDifference(start, end) {
      let years = end.getFullYear() - start.getFullYear();
      let months = end.getMonth() - start.getMonth();
      let days = end.getDate() - start.getDate();

      if (days < 0) {
        months--;
        const previousMonth = new Date(end.getFullYear(), end.getMonth(), 0);
        days += previousMonth.getDate();
      }

      if (months < 0) {
        years--;
        months += 12;
      }

      return {
        years,
        months,
        days
      };
    }

    function formatDuration() {
      if (totalDays < 7) {
        return totalDays + " " + plural(totalDays, "Day");
      }

      if (totalDays < 30) {
        if (totalDays % 7 === 0) {
          const weeks = totalDays / 7;
          return weeks + " " + plural(weeks, "Week");
        }

        return totalDays + " " + plural(totalDays, "Day");
      }

      const diff = getCalendarDifference(startDate, today);
      const parts = [];

      if (diff.years > 0) {
        parts.push(diff.years + " " + plural(diff.years, "Year"));
      }

      if (diff.months > 0) {
        parts.push(diff.months + " " + plural(diff.months, "Month"));
      }

      if (diff.days > 0) {
        if (diff.days % 7 === 0) {
          const weeks = diff.days / 7;
          parts.push(weeks + " " + plural(weeks, "Week"));
        } else {
          parts.push(diff.days + " " + plural(diff.days, "Day"));
        }
      }

      if (parts.length === 0) {
        return totalDays + " " + plural(totalDays, "Day");
      }

      return parts.join(", ");
    }

    durationDisplay.textContent = formatDuration();

    const CELEBRATE_ONLY_MILESTONES = false;
    const MILESTONE_DAYS = new Set([7, 30, 100, 365]);
    let hasCelebratedThisLoad = false;

    function shouldCelebrate(days) {
      if (!CELEBRATE_ONLY_MILESTONES) {
        return true;
      }

      return MILESTONE_DAYS.has(days);
    }

    function fireSubtleConfetti() {
      if (hasCelebratedThisLoad || !shouldCelebrate(totalDays)) {
        return;
      }

      if (window.matchMedia("(prefers-reduced-motion: reduce)").matches) {
        hasCelebratedThisLoad = true;
        return;
      }

      if (typeof window.confetti !== "function") {
        return;
      }

      hasCelebratedThisLoad = true;

      const animationDuration = 2800;
      const intervalMs = 320;
      const end = Date.now() + animationDuration;

      const burstTimer = setInterval(() => {
        if (Date.now() > end) {
          clearInterval(burstTimer);
          return;
        }

        const horizontalJitter = (Math.random() - 0.5) * 0.12;
        const origin = { x: 0.5 + horizontalJitter, y: 0.95 };
        const angle = 90 + (Math.random() - 0.5) * 18;
        const isSmallScreen = window.innerWidth < 640;

        window.confetti({
          particleCount: isSmallScreen ? 12 : 18,
          startVelocity: isSmallScreen ? 20 : 24,
          angle,
          spread: 44,
          ticks: 140,
          gravity: 0.95,
          scalar: isSmallScreen ? 0.85 : 0.95,
          colors: ["#9cc8b8", "#f2cf66", "#f3a683", "#f7f4ef", "#1f1f1f"],
          disableForReducedMotion: true,
          origin
        });
      }, intervalMs);
    }

    window.addEventListener("load", fireSubtleConfetti, { once: true });
  </script>
</body>
</html>
